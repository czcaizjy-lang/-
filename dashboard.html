<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6月业绩追击 - 星辞看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2a2d3a;
  --text: #e4e4e7;
  --text2: #9ca3af;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --blue: #3b82f6;
  --table-head: #1e2130;
}
[data-theme="light"] {
  --bg: #f4f4f6;
  --card: #ffffff;
  --border: #e0e0e4;
  --text: #1c1c28;
  --text2: #8e8e98;
  --accent: #6366f1;
  --accent2: #4f46e5;
  --green: #16a34a;
  --red: #dc2626;
  --orange: #d97706;
  --blue: #2563eb;
  --table-head: #f0f0f3;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px;
}
.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 28px;
}
.header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.header .subtitle { color: var(--text2); font-size: 13px; margin-top: 2px; }
.tabs {
  display: flex; gap: 4px; background: var(--card); border-radius: 10px;
  padding: 4px; border: 1px solid var(--border);
}
.tab {
  padding: 7px 16px; border-radius: 7px; font-size: 13px;
  cursor: pointer; color: var(--text2); transition: all 0.2s;
  border: none; background: none;
}
.tab.active { background: var(--accent); color: #fff; }
.tab:hover:not(.active) { color: var(--text); }
.data-source-toggle {
  display: flex; gap: 4px; background: var(--card); border-radius: 10px;
  padding: 4px; border: 1px solid var(--border); margin-right: 8px;
}
.data-source-btn {
  padding: 7px 14px; border-radius: 7px; font-size: 13px;
  cursor: pointer; color: var(--text2); transition: all 0.2s;
  border: none; background: none; white-space: nowrap;
}
.data-source-btn.active { background: var(--orange); color: #fff; }
.data-source-btn:hover:not(.active) { color: var(--text); }
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 28px;
}
.kpi-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 20px;
}
.kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
.kpi-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
.kpi-value.green { color: var(--green); }
.kpi-value.orange { color: var(--orange); }
.kpi-value.blue { color: var(--blue); }
.kpi-value.red { color: var(--red); }
.section { margin-bottom: 28px; }
.section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ''; width: 3px; height: 16px; background: var(--accent); border-radius: 2px; }
table {
  width: 100%; border-collapse: collapse; font-size: 13px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
thead th {
  background: var(--table-head); padding: 12px 14px;
  text-align: left; font-weight: 500; color: var(--text2);
  border-bottom: 1px solid var(--border); white-space: nowrap;
  cursor: pointer; user-select: none; position: sticky; top: 0;
}
thead th .col-resize-handle {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 6px; cursor: col-resize; z-index: 10;
}
thead th .col-resize-handle:hover {
  background: var(--accent);
}
thead th .col-resize-handle.active { background: var(--accent); }
thead th:hover { color: var(--text); }
thead th .sort-ind { font-size: 10px; margin-left: 4px; opacity: 0.4; }
thead th .sort-ind.active { opacity: 1; color: var(--accent2); }
tbody td {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
}
tbody tr:hover { background: rgba(99,102,241,0.06); }
tbody tr:last-child td { border-bottom: none; }
/* Person drill-down table */
.person-drill-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.person-drill-table thead th {
  padding: 8px 12px; background: var(--table-head); color: var(--text2);
  font-weight: 600; font-size: 11px; text-align: right;
  border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 1;
}
.person-drill-table thead th:first-child { text-align: left; }
.person-drill-table tbody td {
  padding: 7px 12px; border-bottom: 1px solid var(--border); text-align: right;
}
.person-drill-table tbody td:first-child { text-align: left; font-weight: 500; }
.person-drill-table tbody tr:hover { background: rgba(99,102,241,0.06); }
.person-drill-table .drill-up { color: var(--green); }
.person-drill-table .drill-down { color: var(--red); }
.person-drill-filter-btn {
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text2);
  font-size: 11px; cursor: pointer; transition: all 0.2s;
}
.person-drill-filter-btn.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 6px; font-size: 12px; font-weight: 600;
}
.rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a1d27; }
.rank-2 { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #1a1d27; }
.rank-3 { background: linear-gradient(135deg, #f59e0b, #b45309); color: #fff; }
.rank-n { background: var(--border); color: var(--text2); }
.bar-cell { position: relative; min-width: 80px; }
.bar-bg {
  position: absolute; left: 0; top: 3px; bottom: 3px;
  border-radius: 4px; background: var(--accent);
  opacity: 0.12; max-width: 100%;
}
.tag {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 500;
}
.tag-green { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-red { background: rgba(239,68,68,0.15); color: var(--red); }
.tag-orange { background: rgba(245,158,11,0.15); color: var(--orange); }
.tag-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
.search-bar {
  display: flex; gap: 10px; margin-bottom: 16px; align-items: center;
}
.search-bar input {
  flex: 1; max-width: 300px; padding: 9px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card); color: var(--text);
  font-size: 13px; outline: none;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar select {
  padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 13px; outline: none;
}
.agency-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.agency-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 20px; transition: border-color 0.2s;
}
.agency-card:hover { border-color: var(--accent); }
.agency-name { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.agency-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
.agency-row .label { color: var(--text2); }
.agency-row .value { font-weight: 500; }
.agency-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 12px; overflow: hidden; }
.agency-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.chart-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px;
}
.chart-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
}
.chart-card-title {
  font-size: 14px; font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.chart-card-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
.chart-canvas-wrap { position: relative; height: 280px; }
.chart-canvas-wrap-sm { height: 200px; }
.pie-section { position: relative; }
.pie-sub-title {
  font-size: 12px; font-weight: 600; color: var(--text2);
  margin-bottom: 10px; padding-left: 2px;
  letter-spacing: 0.3px;
}
.pie-divider {
  height: 1px; background: var(--border);
  margin: 10px 0 16px 0;
}
@media (max-width: 900px) {
  .chart-grid { grid-template-columns: 1fr; }
}
.hidden { display: none; }
.table-wrap { overflow-x: auto; border-radius: 12px; }
@media (max-width: 768px) {
  body { padding: 12px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .kpi-value { font-size: 20px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>6月业绩追击（纯直播）</h1>
    <div class="subtitle">星辞 · 蕉下运动旗舰店 · <span id="updateTime"></span></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="data-source-toggle">
      <button class="data-source-btn active" data-source="all" onclick="switchDataSource('all')">全部</button>
      <button class="data-source-btn" data-source="zidahao" onclick="switchDataSource('zidahao')">自达号</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchView('anchors')">达人明细</button>
      <button class="tab" onclick="switchView('agencies')">机构汇总</button>
    </div>
    <button id="themeToggle" onclick="toggleTheme()" title="切换浅色/深色主题" style="width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--text);line-height:1;">🌙</button>
  </div>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div id="progressSection" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:24px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
    <div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;">
      <span style="width:3px;height:14px;background:var(--accent);border-radius:2px;display:inline-block;"></span>
      6月进度追踪
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);">
      <span>目标 GMV：</span>
      <input type="text" id="targetGmvInput" style="width:120px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;text-align:right;" oninput="updateProgress()">
      <span>万</span>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:18px;">
    <div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
        <span style="font-size:13px;color:var(--text2);">时间进度</span>
        <span style="font-size:13px;font-weight:600;" id="timeProgressPct"></span>
      </div>
      <div id="timeProgressHoverZone" style="position:relative;"
           onmouseenter="showExpectedGmv()" onmouseleave="hideExpectedGmv()">
        <div style="height:10px;border-radius:5px;background:var(--border);overflow:hidden;position:relative;cursor:pointer;" id="timeProgressBarWrap">
          <div id="timeProgressBar" style="height:100%;border-radius:5px;background:linear-gradient(90deg,#818cf8,#a78bfa);transition:width 0.6s;"></div>
        </div>
        <div id="expectedGmvTooltip" style="display:none;margin-top:6px;padding:6px 10px;border-radius:6px;background:var(--card);border:1px solid var(--border);font-size:12px;color:var(--text2);text-align:center;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text2);">
        <span>6月1日</span><span id="timeNowLabel"></span><span>6月30日</span>
      </div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
        <span style="font-size:13px;color:var(--text2);">GMV 完成进度</span>
        <span style="font-size:13px;font-weight:600;" id="gmvProgressPct"></span>
      </div>
      <div style="height:10px;border-radius:5px;background:var(--border);overflow:hidden;position:relative;">
        <div id="gmvProgressBar" style="height:100%;border-radius:5px;background:linear-gradient(90deg,#22c55e,#4ade80);transition:width 0.6s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text2);">
        <span id="gmvCurrentLabel">当前 GMV: -</span>
        <span id="gmvTargetLabel">目标: -</span>
      </div>
    </div>
  </div>
</div>

<div class="chart-grid" style="grid-template-columns: 1fr 1fr;">
  <div class="chart-card">
    <div class="chart-card-title">达播组每日总业绩趋势</div>
    <div class="chart-canvas-wrap"><canvas id="totalTrendChart"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-card-title">每日机构业绩趋势</div>
    <div class="chart-canvas-wrap"><canvas id="agencyTrendChart"></canvas></div>
  </div>
</div>

<div class="chart-grid">
  <div class="chart-card" id="personTrendCard">
    <div class="chart-card-title" style="flex-wrap:wrap;gap:8px;">
      <span>久酒 / 雅宁 / 星辞 分天业绩</span>
      <div style="display:flex;gap:4px;margin-left:auto;">
        <button class="person-btn active" data-person="all" onclick="focusPerson('all')" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--accent);color:#fff;font-size:11px;cursor:pointer;transition:all 0.2s;">全部</button>
        <button class="person-btn" data-person="久酒" onclick="focusPerson('久酒')" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all 0.2s;">久酒</button>
        <button class="person-btn" data-person="雅宁" onclick="focusPerson('雅宁')" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all 0.2s;">雅宁</button>
        <button class="person-btn" data-person="星辞" onclick="focusPerson('星辞')" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all 0.2s;">星辞</button>
      </div>
    </div>
    <div class="chart-canvas-wrap" style="height:460px"><canvas id="personTrendChart"></canvas></div>
  </div>
  <div class="chart-card" id="pieCard">
    <div class="chart-card-title">业绩占比</div>
    <div class="pie-section" id="agencyPieSection">
      <div class="pie-sub-title">机构</div>
      <div class="chart-canvas-wrap chart-canvas-wrap-sm"><canvas id="agencyPieChart"></canvas></div>
    </div>
    <div class="pie-divider"></div>
    <div class="pie-section" id="personPieSection">
      <div class="pie-sub-title">人员 <span style="font-weight:400;font-size:11px;color:var(--text2);">星辞 · 雅宁 · 久酒</span></div>
      <div class="chart-canvas-wrap chart-canvas-wrap-sm"><canvas id="personPieChart"></canvas></div>
    </div>
  </div>
</div>

<div id="anchorsView" class="section">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索达人名称 / 抖音号..." onkeydown="if(event.key==='Enter')filterAnchors()">
    <button onclick="filterAnchors()" style="padding:9px 16px;border-radius:8px;border:1px solid var(--accent);background:rgba(99,102,241,0.15);color:var(--accent2);font-size:13px;cursor:pointer;white-space:nowrap;">查询</button>
    <select id="agencyFilter" onchange="filterAnchors()">
      <option value="">全部机构</option>
    </select>
  </div>
  <div class="table-wrap">
    <table id="anchorTable">
      <thead><tr id="anchorHead"></tr></thead>
      <tbody id="anchorBody"></tbody>
    </table>
  </div>
</div>

<div id="agenciesView" class="section hidden">
  <div class="agency-grid" id="agencyGrid"></div>
</div>

<div id="drillModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:16px;padding:24px;width:90%;max-width:700px;position:relative;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 id="drillTitle" style="margin:0;font-size:16px;"></h3>
      <button onclick="closeDrillModal()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;">&times;</button>
    </div>
    <div style="height:280px;position:relative;"><canvas id="drillChart"></canvas></div>
  </div>
</div>

<div id="agencyDrillModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:16px;padding:24px;width:90%;max-width:700px;position:relative;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <h3 id="agencyDrillTitle" style="margin:0;font-size:16px;"></h3>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="agencyDrillShowAllBtn" onclick="agencyDrillShowAll()" style="background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;display:none;">全部显示</button>
        <button onclick="closeAgencyDrillModal()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;">&times;</button>
      </div>
    </div>
    <div id="agencyDrillSubtitle" style="font-size:12px;color:var(--text2);margin-bottom:14px;">Top 5 达人 · 6月1日至今每日支付 GMV</div>
    <div style="height:320px;position:relative;"><canvas id="agencyDrillChart"></canvas></div>
  </div>
</div>

<div id="personDrillModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:1001;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:16px;padding:24px;width:90%;max-width:800px;max-height:85vh;position:relative;display:flex;flex-direction:column;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-shrink:0;">
      <h3 id="personDrillTitle" style="margin:0;font-size:16px;"></h3>
      <button onclick="closePersonDrillModal()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;">&times;</button>
    </div>
    <div id="personDrillSubtitle" style="font-size:12px;color:var(--text2);margin-bottom:12px;flex-shrink:0;"></div>
    <div id="personDrillFilter" style="display:flex;gap:6px;margin-bottom:12px;flex-shrink:0;display:none;">
      <button onclick="filterPersonDrill('all')" class="person-drill-filter-btn active" data-filter="all">全部</button>
      <button onclick="filterPersonDrill('down')" class="person-drill-filter-btn" data-filter="down">↓ 仅下降</button>
      <button onclick="filterPersonDrill('up')" class="person-drill-filter-btn" data-filter="up">↑ 仅上涨</button>
    </div>
    <div style="overflow-y:auto;max-height:60vh;flex:1;">
      <table class="person-drill-table">
        <thead><tr id="personDrillHead"></tr></thead>
        <tbody id="personDrillBody"></tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-top:8px;text-align:center;flex-shrink:0;">
      按当日较前日变化量排序 · 仅显示变化量 ≥ 0.01万的达人
    </div>
  </div>
</div>

<script>
let DATA = null;
let sortCol = '直播GMV';
let sortDir = -1;
let currentTheme = 'dark';
let currentDataSource = 'all';  // 'all' | 'zidahao'

const ZDH_SUB_AGENCIES = ['花开自达号', '集米自达号', '太古自达号', '九三自达号', '直属自达号'];
const ZDH_PIE_COLORS = ['#818cf8','#22c55e','#f59e0b','#ec4899','#14b8a6'];

// 月份交界虚线插件：在跨月位置画垂直虚线
Chart.register({
  id: 'monthBoundaryLine',
  afterDraw: function(chart) {
    var labels = chart.data.labels;
    if (!labels || labels.length < 2) return;
    var firstMonth = labels[0].split('/')[0];
    var boundaryIdx = -1;
    for (var i = 1; i < labels.length; i++) {
      if (labels[i].split('/')[0] !== firstMonth) {
        boundaryIdx = i;
        break;
      }
    }
    if (boundaryIdx < 0) return;
    var xScale = chart.scales.x;
    var yScale = chart.scales.y;
    if (!xScale || !yScale) return;
    // 画在旧月最后一天和新月第一天之间
    var x = xScale.getPixelForValue(boundaryIdx - 0.5);
    var ctx = chart.ctx;
    ctx.save();
    ctx.beginPath();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = currentTheme === 'light' ? '#52525b' : '#9ca3af';
    ctx.lineWidth = 1.5;
    ctx.moveTo(x, yScale.top);
    ctx.lineTo(x, yScale.bottom);
    ctx.stroke();
    ctx.restore();
  }
});

function fmt(v, type) {
  if (v === null || v === undefined || v === '' || v === 'None') return '-';
  if (type === 'money') {
    let n = parseFloat(v);
    if (isNaN(n)) return v;
    if (Math.abs(n) >= 10000) return '¥' + (n/10000).toFixed(2) + '万';
    return '¥' + n.toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 2});
  }
  if (type === 'pct') {
    let n = parseFloat(v);
    if (isNaN(n)) return v;
    return (n * 100).toFixed(1) + '%';
  }
  if (type === 'num') {
    let n = parseFloat(v);
    if (isNaN(n)) return v;
    return n.toLocaleString();
  }
  return v;
}

function currentMonthLabel() {
  // 从趋势日期中提取月份信息

  }
  return '';
}

function updateProgress() {
  const now = new Date();
  const day = now.getDate();
  const totalDays = 30;
  const timePct = (day / totalDays) * 100;

  document.getElementById('timeProgressBar').style.width = timePct.toFixed(1) + '%';
  document.getElementById('timeProgressPct').textContent = timePct.toFixed(1) + '%';
  document.getElementById('timeNowLabel').textContent = `今天: 6/${day}`;

  const currentGmv = (DATA && DATA.summary) ? (DATA.summary['直播GMV'] || 0) : 0;
  const currentGmvWan = currentGmv / 10000;

  const targetInput = document.getElementById('targetGmvInput');
  const targetWan = parseFloat(targetInput.value) || 0;
  if (targetWan > 0) {
    localStorage.setItem('targetGmvWan', String(targetWan));
  }
  const gmvPct = targetWan > 0 ? (currentGmvWan / targetWan) * 100 : 0;
  const gmvColor = gmvPct >= timePct ? '#22c55e' : gmvPct >= timePct * 0.8 ? '#f59e0b' : '#ef4444';

  document.getElementById('gmvProgressBar').style.width = Math.min(gmvPct, 100).toFixed(1) + '%';
  document.getElementById('gmvProgressBar').style.background = `linear-gradient(90deg, ${gmvColor}, ${gmvColor}dd)`;
  document.getElementById('gmvProgressPct').textContent = gmvPct.toFixed(1) + '%';
  document.getElementById('gmvProgressPct').style.color = gmvColor;
  document.getElementById('gmvCurrentLabel').textContent = `当前 GMV: ¥${currentGmvWan.toFixed(2)}万`;
  document.getElementById('gmvTargetLabel').textContent = `目标: ¥${targetWan.toFixed(0)}万`;

  // 应达 GMV（时间进度 × 目标）
  const expectedWan = (timePct / 100) * targetWan;
  window.__expectedGmvWan = expectedWan;
}

      tooltip: {
        backgroundColor: cc.tooltipBg, titleColor: cc.tooltipTitle, bodyColor: cc.tooltipBody,
        borderColor: cc.tooltipBorder, borderWidth: 1, padding: 10, cornerRadius: 8,
        callbacks: { label: ctx => ctx.dataset.label + ': ¥' + ctx.parsed.y.toFixed(1) + '万' }
      }
    },
    scales: {
      x: { grid: { color: cc.grid }, ticks: { color: cc.tick, font: { size: 10 },
        callback: function(val, index, ticks) {
          var label = this.getLabelForValue(val);
          // 月份交界首日始终显示
          if (index > 0 && ticks[index - 1]) {
            var prevLabel = this.getLabelForValue(ticks[index - 1].value);
            if (prevLabel && label && label.split('/')[0] !== prevLabel.split('/')[0]) return label;
          }
          var step = Math.max(1, Math.ceil(ticks.length / 6));
          if (index % step === 0 || index === ticks.length - 1) return label;
          return '';
        }
      }},
      y: { grid: { color: cc.grid }, ticks: { color: cc.tick, font: { size: 10 }, callback: v => v + '万' }}
    }
  };

  // Chart 1: 自达号总业绩趋势
  const totalCtx = document.getElementById('totalTrendChart').getContext('2d');
  if (window.__totalChart) window.__totalChart.destroy();
  window.__totalChart = new Chart(totalCtx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [
        {
          label: '成交金额（自达号）',
          data: z.daily_gmv,
          borderColor: '#818cf8', backgroundColor: 'rgba(129,140,248,0.12)',
          borderWidth: 2.5, pointRadius: 3, pointHoverRadius: 6,
          fill: true, tension: 0.35
        },
        {
          label: '用户支付（自达号）',
          data: z.daily_paid,
          borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.06)',
          borderWidth: 2, pointRadius: 2, fill: true, tension: 0.35
        },
        {
          label: '退款金额（自达号）',
          data: z.daily_refund,
          borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.06)',
          borderWidth: 2, pointRadius: 2, borderDash: [5,3], fill: true, tension: 0.35
        }
      ]
    },
    options: {
      ...chartOpts,
      onClick: function(evt, elements) {
        if (!elements || elements.length === 0) return;
        const dataIdx = elements[0].index;
        showZidahaoDrill(dataIdx);
      }
    }
  });

  // Chart 2: 自达号子机构趋势
  const agencyCtx = document.getElementById('agencyTrendChart').getContext('2d');
  if (window.__agencyChart) window.__agencyChart.destroy();
  const subAgencyColors = ['#818cf8','#22c55e','#f59e0b','#ec4899','#14b8a6'];
  const agencyDatasets = ZDH_SUB_AGENCIES.map((sub, i) => ({
    label: sub,
    data: z.daily_by_sub[sub] || [],
    borderColor: subAgencyColors[i % subAgencyColors.length],
    backgroundColor: 'transparent',
    borderWidth: 2, pointRadius: 2, pointHoverRadius: 5, tension: 0.35
  }));
  window.__agencyFocusMode = false;
  window.__agencyChart = new Chart(agencyCtx, {
    type: 'line',
    data: { labels: dates, datasets: agencyDatasets },
    options: {
      ...chartOpts,
      onClick: function(evt, elements) {
        const chart = window.__agencyChart;
        if (!chart) return;
        if (elements.length === 0) {
          if (window.__agencyFocusMode) {
            for (let i = 0; i < chart.data.datasets.length; i++) {
              chart.getDatasetMeta(i).hidden = false;
            }
            window.__agencyFocusMode = false;
            chart.update();
          }
          return;
        }
        const clickedIdx = elements[0].datasetIndex;
        for (let i = 0; i < chart.data.datasets.length; i++) {
          chart.getDatasetMeta(i).hidden = (i !== clickedIdx);
        }
        window.__agencyFocusMode = true;
        chart.update();
      },
      plugins: {
        ...chartOpts.plugins,
        legend: {
          ...chartOpts.plugins.legend,
          position: 'top',
          labels: { ...chartOpts.plugins.legend.labels, font: { size: 10 }, padding: 10 },
          onClick: function(evt, legendItem, legend) {
            const chart = legend.chart;
            const clickedIdx = legendItem.datasetIndex;
            const total = chart.data.datasets.length;
            if (window.__agencyFocusMode) {
              for (let i = 0; i < total; i++) {
                chart.getDatasetMeta(i).hidden = false;
              }
              window.__agencyFocusMode = false;
            } else {
              for (let i = 0; i < total; i++) {
                chart.getDatasetMeta(i).hidden = (i !== clickedIdx);
              }
              window.__agencyFocusMode = true;
            }
            chart.update();
          }
        }
      }
    }
  });

  // Chart 3: 自达号子机构占比饼图
  const pieCtx = document.getElementById('agencyPieChart').getContext('2d');
  if (window.__agencyPieChart) window.__agencyPieChart.destroy();
  const pieData = z.pie_data || [];
  window.__agencyPieChart = new Chart(pieCtx, {
    type: 'doughnut',
    data: {
      labels: pieData.map(p => p.name),
      datasets: [{
        data: pieData.map(p => p.value),
        backgroundColor: pieData.map((_, i) => ZDH_PIE_COLORS[i % ZDH_PIE_COLORS.length]),
        borderColor: currentTheme === 'light' ? '#ffffff' : '#1a1d27',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: function(evt, elements) {
        if (!elements || elements.length === 0) return;
        const idx = elements[0].index;
        const subName = pieData[idx].name;
        const subColor = ZDH_PIE_COLORS[idx % ZDH_PIE_COLORS.length];
        showAgencyDrill(subName, subColor);
      },
      plugins: {
        legend: {
          position: 'right',
          labels: { color: cc.legend, font: { size: 11 }, padding: 10, boxWidth: 12 }
        },
        tooltip: {
          backgroundColor: cc.tooltipBg, titleColor: cc.tooltipTitle, bodyColor: cc.tooltipBody,
          borderColor: cc.tooltipBorder, borderWidth: 1,
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = ((ctx.parsed / total) * 100).toFixed(1);
              return `${ctx.label}: ¥${ctx.parsed.toFixed(1)}万 (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

function getColType(col) {
  if (!col) return '';
  if (col.includes('GMV') || col.includes('收入') || col.includes('支出') || col.includes('利润') || col.includes('费用') || col.includes('佣金') || col.includes('服务费') || col.includes('投放') || col.includes('金额')) return 'money';
  if (col.includes('率') || col.includes('占比') || col === '佣金率' || col === '团长费率' || col === '预估毛利' || col === '预估固定费用') return 'pct';
  if (col === '开播天数' || col === '机构达人数') return 'num';
  return '';
}

const DISPLAY_COLS = ['主播昵称', '机构', '开播天数', '日均开播时长（小时）', '直播GMV', '直播支付GMV', '直播退款GMV', '直播结算GMV', '结算率', 'ROI', '佣金支出', '投放消耗金额'];
const ZDH_DISPLAY_COLS = ['主播昵称', '机构', '开播天数', '日均开播时长（小时）', '直播GMV', '直播支付GMV', '直播退款GMV', '直播结算GMV', '结算率', 'ROI', '佣金支出', '投放消耗金额'];

// 列显示名映射（字段名 → 表头显示名）
const COL_LABELS = {
  '直播GMV': '直播总成交金额',
  '直播支付GMV': '直播支付GMV',
};
function colLabel(col) { return COL_LABELS[col] || col; }

function getCols() { return currentDataSource === 'zidahao' ? ZDH_DISPLAY_COLS : DISPLAY_COLS; }

let draggedCol = null;

function startDrag(col, evt) {
  draggedCol = col;
  evt.dataTransfer.effectAllowed = 'move';
  evt.dataTransfer.setData('text/plain', col);
  setTimeout(() => evt.target.style.opacity = '0.4', 0);
}

function endDrag(evt) {
  evt.target.style.opacity = '1';
  draggedCol = null;
  document.querySelectorAll('thead th').forEach(th => {
    th.style.borderLeft = '';
    th.style.borderRight = '';
  });
}

// ---- 列宽拖拽 ----
let resizeState = null;

function initResize(e) {
  e.preventDefault();
  e.stopPropagation();
  const th = e.currentTarget.closest('th');
  if (!th) return;
  resizeState = {
    startX: e.clientX,
    startWidth: th.offsetWidth,
    th: th
  };
  const handle = th.querySelector('.col-resize-handle');
  if (handle) handle.classList.add('active');
  document.body.style.userSelect = 'none';
  document.body.style.cursor = 'col-resize';
  document.addEventListener('mousemove', onResizeMove);
  document.addEventListener('mouseup', onResizeEnd);
}

function onResizeMove(e) {
  if (!resizeState) return;
  const delta = e.clientX - resizeState.startX;
  const newWidth = Math.max(50, resizeState.startWidth + delta);
  resizeState.th.style.width = newWidth + 'px';
  resizeState.th.style.minWidth = newWidth + 'px';
}

function onResizeEnd() {
  if (!resizeState) return;
  const handle = resizeState.th.querySelector('.col-resize-handle');
  if (handle) handle.classList.remove('active');
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
  saveColumnWidths();
  resizeState = null;
  document.removeEventListener('mousemove', onResizeMove);
  document.removeEventListener('mouseup', onResizeEnd);
}

function saveColumnWidths() {
  const widths = {};
  document.querySelectorAll('#anchorHead th').forEach(th => {
    const col = th.getAttribute('data-col') || '#';
    widths[col] = th.offsetWidth;
  });
  localStorage.setItem('anchorColWidths', JSON.stringify(widths));
}

function applyColumnWidths() {
  const saved = localStorage.getItem('anchorColWidths');
  if (!saved) return;
  try {
    const widths = JSON.parse(saved);
    document.querySelectorAll('#anchorHead th').forEach(th => {
      const col = th.getAttribute('data-col') || '#';
      if (widths[col]) {
        th.style.width = widths[col] + 'px';
        th.style.minWidth = widths[col] + 'px';
      }
    });
  } catch(e) {}
}

function dragOver(col, evt) {
  evt.preventDefault();
  evt.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('thead th').forEach(th => {
    th.style.borderLeft = '';
    th.style.borderRight = '';
  });
  const target = evt.currentTarget;
  if (draggedCol && col !== draggedCol) {
    const cols = getCols();
    const draggedIdx = cols.indexOf(draggedCol);
    const targetIdx = cols.indexOf(col);
    if (draggedIdx < targetIdx) {
      target.style.borderRight = '2px solid #818cf8';
    } else {
      target.style.borderLeft = '2px solid #818cf8';
    }
  }
}

function dropCol(targetCol, evt) {
  evt.preventDefault();
  if (!draggedCol || draggedCol === targetCol) return;
  const cols = getCols();
  const fromIdx = cols.indexOf(draggedCol);
  const toIdx = cols.indexOf(targetCol);
  if (fromIdx === -1 || toIdx === -1) return;
  cols.splice(fromIdx, 1);
  cols.splice(toIdx, 0, draggedCol);
  renderAnchorTable();
}

function renderAnchorTable() {
  // Header
  let headHtml = '<th data-col="#"><span>#</span><div class="col-resize-handle" onmousedown="initResize(event)"></div></th>';
  const cols = getCols();
  const centerFrom = 2; // 从索引2开始居中对齐（即"开播天数"）
  cols.forEach((col, idx) => {
    let isActive = sortCol === col;
    let arrow = isActive ? (sortDir === -1 ? '▼' : '▲') : '▼';
    let alignStyle = idx >= centerFrom ? 'text-align: center;' : '';
    headHtml += `<th data-col="${col}" draggable="true" ondragstart="startDrag('${col}', event)" ondragend="endDrag(event)" ondragover="dragOver('${col}', event)" ondrop="dropCol('${col}', event)" onclick="sortBy('${col}')" style="cursor: grab;${alignStyle}"><span>${colLabel(col)}</span><span class="sort-ind ${isActive ? 'active' : ''}">${arrow}</span><div class="col-resize-handle" onmousedown="initResize(event)"></div></th>`;
  });
  document.getElementById('anchorHead').innerHTML = headHtml;
  applyColumnWidths();

  // Sort
  const anchorsSource = (currentDataSource === 'zidahao' && DATA.zidahao)
    ? DATA.zidahao.anchors : DATA.anchors;
  let anchors = [...anchorsSource];
  anchors.sort((a, b) => {
    let va, vb;
    if (sortCol === 'ROI') {
      const vaGmv = parseFloat(a['直播GMV']) || 0;
      const vaAd = parseFloat(a['投放消耗金额']) || 0;
      const vbGmv = parseFloat(b['直播GMV']) || 0;
      const vbAd = parseFloat(b['投放消耗金额']) || 0;
      va = vaAd > 0 ? vaGmv / vaAd : 0;
      vb = vbAd > 0 ? vbGmv / vbAd : 0;
    } else if (sortCol === '时均 GMV') {
      const vaGmv = parseFloat(a['直播GMV']) || 0;
      const vaDays = parseFloat(a['开播天数']) || 0;
      const vaHours = parseFloat(a['日均开播时长（小时）']) || 0;
      const vbGmv = parseFloat(b['直播GMV']) || 0;
      const vbDays = parseFloat(b['开播天数']) || 0;
      const vbHours = parseFloat(b['日均开播时长（小时）']) || 0;
      va = (vaDays > 0 && vaHours > 0) ? (vaGmv / vaDays / vaHours) : 0;
      vb = (vbDays > 0 && vbHours > 0) ? (vbGmv / vbDays / vbHours) : 0;
    } else {
      va = parseFloat(a[sortCol]) || 0;
      vb = parseFloat(b[sortCol]) || 0;
    }
    return (va - vb) * sortDir;
  });

  // Filter
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const agencyVal = document.getElementById('agencyFilter')?.value || '';
  if (search || agencyVal) {
    anchors = anchors.filter(a => {
      let match = true;
      if (search) {
        match = match && ((a['主播昵称']||'').toLowerCase().includes(search) || (a['主播抖音号']||'').toString().includes(search));
      }
      if (agencyVal) {
        match = match && (a['机构']||'') === agencyVal;
      }
      return match;
    });
  }

  const maxGMV = Math.max(...anchorsSource.map(a => parseFloat(a['直播GMV']) || 0));

  // Body
  let bodyHtml = '';
  anchors.forEach((a, i) => {
    const rank = i + 1;
    let rankClass = rank <= 3 ? `rank-${rank}` : 'rank-n';
    const douyinId = a['主播抖音号'] || '';
    bodyHtml += `<tr data-douyin="${douyinId}" data-name="${a['主播昵称'] || ''}">`;
    bodyHtml += `<td><span class="rank-badge ${rankClass}">${rank}</span></td>`;
    getCols().forEach((col, colIdx) => {
      let val = a[col];
      let type = getColType(col);
      let alignStyle = colIdx >= centerFrom ? 'text-align: center;' : '';
      if (col === '主播昵称') {
        const douyinId = a['主播抖音号'] || '';
        const storedNote = localStorage.getItem('note_' + douyinId);
        const note = storedNote !== null ? storedNote : '';
        bodyHtml += `<td><div style="font-weight:500">${val || '-'}</div><input type="text" value="${(note||'').replace(/"/g, '&quot;')}" placeholder="添加备注..." onchange="saveNote('${douyinId}', this.value)" style="width:100%;margin-top:3px;padding:2px 4px;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--text2);font-size:11px;outline:none;" onfocus="this.style.borderColor='var(--accent)';this.style.background='var(--bg)'" onblur="this.style.borderColor='transparent';this.style.background='transparent'"></td>`;
      } else if (col === '直播GMV' && val && maxGMV > 0) {
        let pct = ((parseFloat(val)/maxGMV)*100).toFixed(0);
        const did = String(douyinId).replace(/'/g, "\\'");
        const dname = String(a['主播昵称'] || '').replace(/'/g, "\\'");
        bodyHtml += `<td class="bar-cell" style="cursor:pointer;${alignStyle}" onclick="showDrillDown('${did}', '${dname}')"><span style="position:relative;z-index:1;font-weight:500;">${fmt(val, type)}</span><div class="bar-bg" style="width:${pct}%"></div></td>`;
      } else if (col === '结算率') {
        let num = parseFloat(val);
        let cls = num >= 0.4 ? 'tag-green' : num >= 0.2 ? 'tag-orange' : 'tag-red';
        bodyHtml += `<td style="${alignStyle}"><span class="tag ${cls}" style="font-size: 15px; font-weight: 600;">${fmt(val, 'pct')}</span></td>`;
      } else if (col === 'ROI') {
        const gmv = parseFloat(a['直播GMV']) || 0;
        const adCost = parseFloat(a['投放消耗金额']) || 0;
        const roi = adCost > 0 ? (gmv / adCost) : 0;
        const did = String(douyinId).replace(/'/g, "\\'");
        const dname = String(a['主播昵称'] || '').replace(/'/g, "\\'");
        let display = roi > 0 ? roi.toFixed(1) : '-';
        bodyHtml += `<td style="cursor:pointer; font-size: 15px; font-weight: 600;${alignStyle}" onclick="showRoiDrill('${did}', '${dname}')">${display}</td>`;
      } else if (col === '日均开播时长（小时）') {
        bodyHtml += `<td style="${alignStyle}">${parseFloat(val) ? parseFloat(val).toFixed(1) : '-'}</td>`;
      } else if (col === '时均 GMV') {
        const gmv = parseFloat(a['直播GMV']) || 0;
        const days = parseFloat(a['开播天数']) || 0;
        const hours = parseFloat(a['日均开播时长（小时）']) || 0;
        const hourlyGmv = (days > 0 && hours > 0) ? (gmv / days / hours) : 0;
        bodyHtml += `<td style="${alignStyle}">${hourlyGmv > 0 ? fmt(hourlyGmv, 'money') : '-'}</td>`;
      } else {
        bodyHtml += `<td style="${alignStyle}">${fmt(val, type)}</td>`;
      }
    });
    bodyHtml += '</tr>';
  });
  document.getElementById('anchorBody').innerHTML = bodyHtml;
}

function renderAgencies() {
  // 根据数据源选择机构列表和过滤条件
  const sourceList = (currentDataSource === 'zidahao' && DATA.zidahao)
    ? DATA.zidahao.sub_agencies : DATA.agencies;
  const filterList = currentDataSource === 'zidahao' ? ZDH_SUB_AGENCIES : MAIN_AGENCIES;
  const filtered = (sourceList || []).filter(a => filterList.includes(a['机构']));
  const maxAgencyGMV = Math.max(1, ...filtered.map(a => parseFloat(a['直播GMV']) || 0));
  let html = '';
  filtered.forEach(a => {
    let name = a['机构'] || '未知';
    let count = a['机构达人数'] || 0;
    let gmv = a['直播GMV'] || 0;
    let avgGMV = a['人均直播GMV'] || 0;
    let refund = a['直播退款GMV'] || 0;
    let settled = a['直播结算GMV'] || 0;
    // 结算率 = 结算GMV / 直播GMV（前端实时计算）
    let rate = gmv > 0 ? (parseFloat(settled) / parseFloat(gmv)) : 0;
    let commission = a['佣金支出'] || 0;
    let ad = a['投放消耗金额'] || 0;
    let totalCost = (parseFloat(commission)||0) + (parseFloat(ad)||0);
    // 自达号：机构ROI = 直播GMV / 消耗金额（消耗为0时显示 -）
    let agencyRoi = (currentDataSource === 'zidahao' && ad > 0) ? (parseFloat(gmv) / parseFloat(ad)) : null;
    let pct = maxAgencyGMV > 0 ? ((parseFloat(gmv)/maxAgencyGMV)*100).toFixed(0) : 0;

    html += `
    <div class="agency-card">
      <div class="agency-name">${name}</div>
      <div class="agency-row"><span class="label">达人数</span><span class="value">${count}</span></div>
      <div class="agency-row"><span class="label">直播GMV</span><span class="value" style="color:var(--accent2)">¥${(parseFloat(gmv)/10000).toFixed(1)}万</span></div>
      <div class="agency-row"><span class="label">人均GMV</span><span class="value">¥${(parseFloat(avgGMV)/10000).toFixed(1)}万</span></div>
      <div class="agency-row"><span class="label">结算GMV</span><span class="value">¥${(parseFloat(settled)/10000).toFixed(1)}万</span></div>
      <div class="agency-row"><span class="label">结算率</span><span class="value"><span class="tag ${rate >= 0.4 ? 'tag-green' : rate >= 0.2 ? 'tag-orange' : 'tag-red'}">${(parseFloat(rate)*100).toFixed(1)}%</span></span></div>
      ${currentDataSource === 'zidahao'
        ? '<div class="agency-row"><span class="label">机构ROI</span><span class="value">' + (agencyRoi !== null ? agencyRoi.toFixed(2) : '-') + '</span></div>'
        : '<div class="agency-row"><span class="label">总费用</span><span class="value">¥' + (totalCost/10000).toFixed(1) + '万</span></div>'}
      <div class="agency-bar"><div class="agency-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  document.getElementById('agencyGrid').innerHTML = html;
}

function populateFilters() {
  const source = (currentDataSource === 'zidahao' && DATA.zidahao)
    ? DATA.zidahao.anchors : DATA.anchors;
  const set = new Set();
  source.forEach(a => { if (a['机构']) set.add(a['机构']); });
  const sel = document.getElementById('agencyFilter');
  sel.innerHTML = '<option value="">全部机构</option>';
  [...set].sort().forEach(v => {
    let opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  renderAnchorTable();
}

function filterAnchors() { renderAnchorTable(); }

function switchView(view) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (view === 'anchors' && i === 0) || (view === 'agencies' && i === 1));
  });
  document.getElementById('anchorsView').classList.toggle('hidden', view !== 'anchors');
  document.getElementById('agenciesView').classList.toggle('hidden', view !== 'agencies');
}

function showDrillDown(douyinId, name) {
  if (!douyinId) return;
  const cc = getChartColors();
  const daily = (DATA.trend && DATA.trend.anchor_daily_paid) ? DATA.trend.anchor_daily_paid[douyinId] : null;
  if (!daily || Object.keys(daily).length === 0) {
    alert(name + ' 暂无分天支付数据');
    return;
  }
  document.getElementById('drillTitle').textContent = name + ' - 每日支付 GMV 趋势';
  document.getElementById('drillModal').style.display = 'flex';
  const dates = DATA.trend.dates;
  const values = dates.map(d => daily[d] || 0);
  const ctx = document.getElementById('drillChart').getContext('2d');
  if (window.__drillChart) window.__drillChart.destroy();

// ---- 自达号 ROI 趋势下钻（各机构每日 ROI） ----
// 口径：Σ(子机构所有达人当日GMV) / Σ(子机构所有达人当日投放消耗)，加权计算
function showZidahaoRoiDrill() {
  const z = DATA.zidahao;
  if (!z) return;

  const cc = getChartColors();
  const dates = DATA.trend ? DATA.trend.dates : [];
  if (dates.length === 0) return;

  // 优先使用后端预计算的加权 ROI（ΣGMV / Σ消耗）
  let subDailyRoi = z.daily_roi_by_sub || {};

  // 兼容：如果后端数据不存在，降级为前端简单平均
  if (!subDailyRoi || Object.keys(subDailyRoi).length === 0) {
    const roiData = (DATA.trend && DATA.trend.anchor_daily_roi) ? DATA.trend.anchor_daily_roi : {};
    const subMap = {};
    (z.anchors || []).forEach(a => {
      const sub = a['机构'] || '其他';
      const douyin = String(a['主播抖音号'] || '');
      if (!subMap[sub]) subMap[sub] = [];
      subMap[sub].push(douyin);
    });
    for (const [sub, douyins] of Object.entries(subMap)) {
      subDailyRoi[sub] = dates.map(d => {
        let sum = 0, count = 0;
        douyins.forEach(dy => {
          const roi = roiData[dy] ? roiData[dy][d] : undefined;
          if (roi !== undefined && roi !== null && roi > 0) { sum += roi; count++; }
        });
        return count > 0 ? sum / count : null;
      });
    }
  }

  // 显示弹窗
  document.getElementById('agencyDrillTitle').textContent = '自达号 · 各机构每日 ROI 趋势';
  document.getElementById('agencyDrillTitle').style.color = 'var(--text)';
  document.getElementById('agencyDrillSubtitle').textContent = '口径：Σ(机构当日GMV) / Σ(机构当日投放消耗) · 加权计算';
  document.getElementById('agencyDrillModal').style.display = 'flex';

  const ctx = document.getElementById('agencyDrillChart').getContext('2d');
  if (window.__agencyDrillChart) window.__agencyDrillChart.destroy();

  const subColors = ['#818cf8','#22c55e','#f59e0b','#ec4899','#14b8a6'];
  const orderedSubs = ZDH_SUB_AGENCIES.filter(s => subDailyRoi[s]);
  for (const sub of Object.keys(subDailyRoi)) {
    if (!orderedSubs.includes(sub)) orderedSubs.push(sub);
  }

  const datasets = orderedSubs.map((sub, i) => ({
    label: sub,
    data: subDailyRoi[sub],
    borderColor: subColors[i % subColors.length],
    backgroundColor: 'transparent',
    borderWidth: 2.2,
    pointRadius: 2.5,
    pointHoverRadius: 6,
    tension: 0.35,
    spanGaps: true
  }));

  // 添加整体 ROI 线（全部自达号加权）
  var overallRoi = z.daily_roi_overall;
  if (overallRoi && overallRoi.length > 0) {
    datasets.push({
      label: '整体 ROI',
      data: overallRoi,
      borderColor: '#c084fc',
      backgroundColor: 'transparent',
      borderWidth: 3,
      borderDash: [6, 3],
      pointRadius: 3,
      pointHoverRadius: 7,
      tension: 0.35,
      spanGaps: true
    });
  }

  window.__agencyDrillChart = new Chart(ctx, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      onClick: function(evt, elements) {
        const chart = window.__agencyDrillChart;
        if (!chart) return;
        if (elements.length === 0) {
          // 点击空白区域 → 全部显示
          var hasHidden = false;
          for (var i = 0; i < chart.data.datasets.length; i++) {
            if (chart.getDatasetMeta(i).hidden) { hasHidden = true; break; }
          }
          if (hasHidden) {
            for (var i = 0; i < chart.data.datasets.length; i++) {
              chart.getDatasetMeta(i).hidden = false;
            }
            chart.update();
            updateShowAllButton(chart);
          }
          return;
        }
        // 点击曲线 → 隐藏该机构
        var clickedIdx = elements[0].datasetIndex;
        chart.getDatasetMeta(clickedIdx).hidden = true;
        chart.update();
        updateShowAllButton(chart);
      },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: cc.legend, font: { size: 11 }, padding: 12, boxWidth: 12, usePointStyle: true, pointStyle: 'circle' },
          onClick: function(evt, legendItem, legend) {
            const chart = legend.chart;
            const idx = legendItem.datasetIndex;
            // 切换该数据集的显示/隐藏（Chart.js 默认行为）
            const meta = chart.getDatasetMeta(idx);
            meta.hidden = !meta.hidden;
            chart.update();
            updateShowAllButton(chart);
          }
        },
        tooltip: {
          backgroundColor: cc.tooltipBg,
          titleColor: cc.tooltipTitle,
          bodyColor: cc.tooltipBody,
          borderColor: cc.tooltipBorder,
          borderWidth: 1,
          padding: 10,
          cornerRadius: 8,
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return v !== null && v !== undefined
                ? ctx.dataset.label + ': ROI ' + v.toFixed(2)
                : ctx.dataset.label + ': 无数据';
            }
          }
        }
      },
      scales: {
        x: { grid: { color: cc.grid }, ticks: { color: cc.tick, font: { size: 10 } } },
        y: {
          grid: { color: cc.grid },
          ticks: { color: cc.tick, font: { size: 10 } },
          title: { display: true, text: 'ROI', color: cc.tick, font: { size: 11 } }
        }
      }
    }
  });
}

function showPersonDrill(personName, dateIndex) {
  const detail = DATA.trend && DATA.trend.person_anchor_detail
    ? DATA.trend.person_anchor_detail[personName] : null;
  if (!detail || detail.length === 0) {
    alert(personName + ' 暂无达人明细数据');
    return;
  }

  const dates = DATA.trend.dates;
  const clickedDate = dates[dateIndex] || '--';
  const prevDate = dateIndex > 0 ? dates[dateIndex - 1] : null;
  const personDaily = DATA.trend.person_daily;
  const todayTotal = personDaily ? (personDaily[personName] ? personDaily[personName][dateIndex] : 0) : 0;
  const yesterdayTotal = prevDate && personDaily
    ? (personDaily[personName] ? personDaily[personName][dateIndex - 1] : 0) : 0;
  const totalChange = prevDate ? (todayTotal - yesterdayTotal) : 0;

  // Build table data
  var rows = [];
  for (var i = 0; i < detail.length; i++) {
    var anchor = detail[i];
    var todayVal = anchor.daily_paid[dateIndex] || 0;
    var yesterdayVal = (prevDate && dateIndex > 0)
      ? (anchor.daily_paid[dateIndex - 1] || 0)
      : 0;
    var change = prevDate ? (todayVal - yesterdayVal) : 0;
    if (Math.abs(change) >= 0.01) {
      rows.push({
        name: anchor.name,
        douyin_id: anchor.douyin_id,
        today: todayVal,
        yesterday: yesterdayVal,
        change: change
      });
    }
  }
  // Sort by change ascending (biggest drop first)
  rows.sort(function(a, b) { return a.change - b.change; });

  // Store for filter
  window.__personDrillRows = rows;
  window.__personDrillPrevDate = prevDate;
  window.__personDrillClickedDate = clickedDate;

  // Build title
  var changeArrow = totalChange >= 0 ? '↑' : '↓';
  var changeCls = totalChange >= 0 ? 'drill-up' : 'drill-down';
  var changeSign = totalChange >= 0 ? '+' : '';
  var titleHtml = personName;
  if (prevDate) {
    titleHtml += ' · ' + clickedDate + ' 较 ' + prevDate + ' ';
    titleHtml += '<span class="' + changeCls + '">' + changeArrow + ' ' + changeSign + totalChange.toFixed(2) + '万</span>';
  } else {
    titleHtml += ' · ' + clickedDate + '（首日，无前日对比）';
  }
  document.getElementById('personDrillTitle').innerHTML = titleHtml;
  document.getElementById('personDrillSubtitle').textContent =
    '共 ' + detail.length + ' 位达人，显示变化量 ≥ 0.01万的 ' + rows.length + ' 位';

  // Build table header
  document.getElementById('personDrillHead').innerHTML =
    '<th style="width:35%;text-align:left;">达人名称</th>' +
    '<th style="width:20%;">当日(' + clickedDate + ')</th>' +
    '<th style="width:20%;">前日(' + (prevDate || '--') + ')</th>' +
    '<th style="width:25%;">变化量</th>';

  // Build table body
  var tbodyHtml = '';
  if (rows.length === 0) {
    tbodyHtml = '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text2);">暂无显著变化（≥ 0.01万）的达人数据</td></tr>';
  } else {
    for (var j = 0; j < rows.length; j++) {
      var row = rows[j];
      var cls = row.change > 0 ? 'drill-up' : (row.change < 0 ? 'drill-down' : '');
      var sign = row.change >= 0 ? '+' : '';
      tbodyHtml +=

  var filterBar = document.getElementById('personDrillFilter');
  filterBar.style.display = 'flex';
  filterBar.querySelectorAll('button').forEach(function(b) {

function filterPersonDrill(filter) {
  var allRows = window.__personDrillRows || [];
  var prevDate = window.__personDrillPrevDate;
  var clickedDate = window.__personDrillClickedDate;

  // Filter rows
  var filtered = allRows;
  if (filter === 'down') {
    filtered = allRows.filter(function(r) { return r.change < 0; });

    filtered = allRows.filter(function(r) { return r.change > 0; }).reverse();

  for (var i = 0; i < chart.data.datasets.length; i++) {
    if (chart.getDatasetMeta(i).hidden) { hasHidden = true; break; }
  }
  btn.style.display = hasHidden ? '' : 'none';
}

function agencyDrillShowAll() {
  var chart = window.__agencyDrillChart;
  if (!chart) return;
  for (var i = 0; i < chart.data.datasets.length; i++) {
    chart.getDatasetMeta(i).hidden = false;
  }
  chart.update();
  updateShowAllButton(chart);
}

function showAgencyDrill(agencyName, agencyColor) {
  document.getElementById('agencyDrillShowAllBtn').style.display = 'none';
  const cc = getChartColors();
  // 根据当前数据源选择 Top 5 数据
  let top5;
  if (currentDataSource === 'zidahao') {
    top5 = (DATA.zidahao && DATA.zidahao.top5_by_sub)
      ? (DATA.zidahao.top5_by_sub[agencyName] || []) : [];
  } else {
    top5 = (DATA.trend && DATA.trend.agency_top5_anchors)
      ? (DATA.trend.agency_top5_anchors[agencyName] || []) : [];
  }
  if (top5.length === 0) {
    alert(agencyName + ' 暂无 Top 5 达人分天数据');
    return;
  }
  const titleSuffix = (currentDataSource === 'zidahao') ? '自达号达人' : '达人';
  document.getElementById('agencyDrillTitle').textContent = agencyName + ' · Top 5 ' + titleSuffix + '趋势';
  document.getElementById('agencyDrillTitle').style.color = agencyColor;
  document.getElementById('agencyDrillSubtitle').textContent = 'Top 5 达人 · 6月1日至今每日支付 GMV';
  document.getElementById('agencyDrillModal').style.display = 'flex';

  const dates = DATA.trend.dates;
  // 使用与"每日机构业绩趋势"完全一致的多色系，便于区分
  const DRILL_COLORS = ['#818cf8','#22c55e','#f59e0b','#3b82f6','#ec4899'];
  const widths = [2.8, 2.4, 2.2, 2, 1.8];
  const radii = [4, 3.5, 3, 2.5, 2];

  const datasets = top5.map((a, i) => {
    const color = DRILL_COLORS[i % DRILL_COLORS.length];
    return {
      label: a.name,
      data: a.daily_paid,
      borderColor: color,
      backgroundColor: color + '22',
      borderWidth: widths[i],
      pointRadius: radii[i],
      pointHoverRadius: radii[i] + 2,
      tension: 0.35,
      fill: false
    };
  });

  const ctx = document.getElementById('agencyDrillChart').getContext('2d');
  if (window.__agencyDrillChart) window.__agencyDrillChart.destroy();
  window.__agencyDrillFocusMode = false;
  window.__agencyDrillChart = new Chart(ctx, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      onClick: function(evt, elements) {
        const chart = window.__agencyDrillChart;
        if (!chart) return;
        if (elements.length === 0) {
          if (window.__agencyDrillFocusMode) {
            for (let i = 0; i < chart.data.datasets.length; i++) {
              chart.getDatasetMeta(i).hidden = false;
            }
            window.__agencyDrillFocusMode = false;
            chart.update();
          }
          return;
        }
        const clickedIdx = elements[0].datasetIndex;
        for (let i = 0; i < chart.data.datasets.length; i++) {
          chart.getDatasetMeta(i).hidden = (i !== clickedIdx);
        }
        window.__agencyDrillFocusMode = true;
        chart.update();
      },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: cc.legend, font: { size: 11 }, padding: 12, boxWidth: 12, usePointStyle: true, pointStyle: 'circle' },
          onClick: function(evt, legendItem, legend) {
            const chart = legend.chart;
            const clickedIdx = legendItem.datasetIndex;
            const total = chart.data.datasets.length;
            if (window.__agencyDrillFocusMode) {
              for (let i = 0; i < total; i++) {
                chart.getDatasetMeta(i).hidden = false;
              }
              window.__agencyDrillFocusMode = false;
            } else {
              for (let i = 0; i < total; i++) {
                chart.getDatasetMeta(i).hidden = (i !== clickedIdx);
              }
              window.__agencyDrillFocusMode = true;
            }
            chart.update();
          }
        },
        tooltip: {
          backgroundColor: cc.tooltipBg,
          titleColor: cc.tooltipTitle,
          bodyColor: cc.tooltipBody,
          borderColor: cc.tooltipBorder,
          borderWidth: 1,
          padding: 10,
          cornerRadius: 8,
          callbacks: { label: ctx => ctx.dataset.label + ': ¥' + ctx.parsed.y.toFixed(2) + '万' }
        }
      },
      scales: {
        x: { grid: { color: cc.grid }, ticks: { color: cc.tick, font: { size: 10 } } },
        y: { grid: { color: cc.grid }, ticks: { color: cc.tick, font: { size: 10 }, callback: v => v + '万' } }
      }
    }
  });
}

function focusPerson(person) {
  const chart = window.__personChart;
  if (!chart) return;
  if (!window.__personFocused) window.__personFocused = 'all';

  // Toggle: clicking same person again → show all
  const newFocus = (window.__personFocused === person) ? 'all' : person;
  window.__personFocused = newFocus;

  // Update button styles
  document.querySelectorAll('.person-btn').forEach(btn => {
    const isActive = btn.getAttribute('data-person') === newFocus;
    btn.classList.toggle('active', isActive);
    btn.style.background = isActive ? 'var(--accent)' : 'transparent';
    btn.style.color = isActive ? '#fff' : 'var(--text2)';
  });

  // Show/hide datasets
  if (newFocus === 'all') {
    chart.data.datasets.forEach((_, i) => { chart.getDatasetMeta(i).hidden = false; });
  } else {
    chart.data.datasets.forEach((ds, i) => { chart.getDatasetMeta(i).hidden = (ds.label !== newFocus); });
  }
  chart.update();
}

function saveNote(douyinId, value) {
  if (douyinId) {
    localStorage.setItem('note_' + douyinId, value || '');
  }
}
</script>
